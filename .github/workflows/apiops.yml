name: APIOps - Kong Konnect

on:
  push:
    branches:
      - main
    paths:
      - "deck/**"
      - "apis/**"
  pull_request:
    branches:
      - main
    paths:
      - "deck/**"
      - "apis/**"
  workflow_dispatch:

env:
  TAG: gorilla-bazaar
  DECK_KONNECT_TOKEN: ${{ secrets.KONNECT_PAT }}
  DECK_KONNECT_CONTROL_PLANE_NAME: ${{ vars.KONNECT_CONTROL_PLANE_NAME }}

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Validate (runs on every push / PR)
  # ──────────────────────────────────────────────────────────
  validate:
    name: Validate Kong Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup decK
        uses: kong/setup-deck@v1.7.1

      # ----- Step 1: Convert OAS → Kong config -----
      - name: Convert OAS to Kong declarative config
        run: |
          deck file openapi2kong \
            --spec apis/specs/openapi.yaml \
            --output-file deck/kong-raw.yaml

      # ----- Step 2: Merge Consumers -----
      - name: Merge Consumers
        run: |
          deck file merge \
            deck/kong-raw.yaml \
            deck/consumers.yaml \
            --output-file deck/kong-merged.yaml

      # ----- Step 3: Add Plugins -----
      - name: Add Plugins
        run: |
          deck file add-plugins \
            --state deck/kong-merged.yaml \
            --output-file deck/kong-plugins.yaml \
            deck/plugins.yaml

      # ----- Step 4: Add tags to all resources -----
      - name: Add tags
        run: |
          deck file add-tags \
            --state deck/kong-plugins.yaml \
            --output-file deck/kong-final.yaml \
            "${{ env.TAG }}"

      # ----- Step 5: Validate -----
      - name: Validate
        run: |
          deck gateway validate deck/kong-final.yaml \
            --konnect-token "$DECK_KONNECT_TOKEN" \
            --konnect-control-plane-name "$DECK_KONNECT_CONTROL_PLANE_NAME" 

      - name: Upload intermediate files (on failure only)
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kong-debug
          path: deck/kong-*.yaml
          retention-days: 3

      - name: Upload generated config
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kong-config
          path: deck/kong-final.yaml
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 2: Deploy (runs only on push to main)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kong Konnect
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup decK
        uses: kong/setup-deck@v1.7.1

      - name: Setup kongctl
        uses: kong/setup-kongctl@v1.0.0
        with:
          kongctl-version: 0.7.0

      - name: Download generated config
        uses: actions/download-artifact@v8.0.1
        with:
          name: kong-config
          path: deck/

      # ----- Step 5: Sync to Kong Gateway (via decK) -----
      - name: Sync to Kong Konnect
        run: |
          deck gateway sync deck/kong-final.yaml \
            --konnect-token "$DECK_KONNECT_TOKEN" \
            --konnect-control-plane-name "$DECK_KONNECT_CONTROL_PLANE_NAME" \
            --select-tag "${{ env.TAG }}"

      # ----- Step 6: Deploy OAS to API Catalog (kongctl) -----
      - name: Deploy OAS to API Catalog
        env:
          KONGCTL_DEFAULT_KONNECT_PAT: ${{ secrets.KONNECT_PAT }}
        run: kongctl apply -f apis/apis.yaml --auto-approve
