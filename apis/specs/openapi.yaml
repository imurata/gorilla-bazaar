openapi: 3.0.3
info:
  title: Gorilla Bazaar API
  description: APIOps demo API for Kong Konnect.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://httpbin.konghq.com/anything

paths:
  /items:
    get:
      summary: List items
      description: Returns a list of items.
      operationId: listItems
      tags: [items]
      responses:
        "200":
          description: OK
    post:
      summary: Create item
      description: Creates a new item.
      operationId: createItem
      tags: [items]
      responses:
        "201":
          description: Created
